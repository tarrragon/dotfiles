# Hyprlock 鎖屏 — Catppuccin Mocha
# stow package: hyprlock/ → ~/.config/hypr/hyprlock.conf
# 由 hyprland.conf 的 keybind 叫起（SUPER+L）。完整選項: https://wiki.hyprland.org/Hyprland/hyprlock/
#
# 配色用 rgba(...) 字面值（hyprlock 不 source colors.conf；它是獨立 binary、
# 自己的設定語法，跟 hyprland.conf 不同檔不共享變數）。hex 對齊 Catppuccin Mocha。

general {
    hide_cursor = true
}

# 背景：截當下畫面 + 模糊。VM 軟體渲染下 blur_passes 越多越吃 CPU，
# 設 2 是「看得出霧化又不卡」的折衷（實測，見 handson record）。
background {
    monitor =
    path = screenshot
    blur_passes = 2
    blur_size = 6
    color = rgba(30, 30, 46, 1.0)   # base，截圖失敗時的純色 fallback
}

# 時鐘
label {
    monitor =
    text = $TIME
    font_size = 64
    font_family = MesloLGS Nerd Font
    color = rgba(205, 214, 244, 1.0)   # text
    position = 0, 120
    halign = center
    valign = center
}

# 日期
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    font_size = 18
    font_family = MesloLGS Nerd Font
    color = rgba(186, 194, 222, 1.0)   # subtext1
    position = 0, 50
    halign = center
    valign = center
}

# 密碼輸入框
input-field {
    monitor =
    size = 280, 52
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.3
    outer_color = rgba(137, 180, 250, 1.0)   # blue
    inner_color = rgba(49, 50, 68, 1.0)      # surface0
    font_color = rgba(205, 214, 244, 1.0)    # text
    placeholder_text = <i>Password</i>
    fail_color = rgba(243, 139, 168, 1.0)    # red
    fail_text = <i>Wrong</i>
    fade_on_empty = false
    position = 0, -40
    halign = center
    valign = center
}
