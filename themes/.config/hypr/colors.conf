# 集中配色定義 — Catppuccin Mocha
# stow package: themes/ → ~/.config/hypr/colors.conf
#
# 為什麼獨立成 themes package 而非塞進某個工具：配色是跨工具共用的資產，
# 一個工具一個 stow package 的切法下，配色不屬於任何單一工具、自成一包。
# 換配色方案時只動這裡 + 各工具引用處，不必翻每個 package。
#
# 限制（實測確認、見 handson record 階段三第二步）：只有 Hyprland 自家的
# .conf（hyprland.conf / hyprlock.conf）能 source 這些 $ 變數。Waybar / Wofi
# 的 CSS、Mako 的 ini 各自獨立、無法引用這裡，只能手動對齊同一組 hex。
# 所以這份是 Hyprland 系列的 SSoT，其他工具的色碼要跟這裡保持一致。

# 主色
$rosewater = rgb(f5e0dc)
$flamingo  = rgb(f2cdcd)
$pink      = rgb(f5c2e7)
$mauve     = rgb(cba6f7)
$red       = rgb(f38ba8)
$maroon    = rgb(eba0ac)
$peach     = rgb(fab387)
$yellow    = rgb(f9e2af)
$green     = rgb(a6e3a1)
$teal      = rgb(94e2d5)
$sky       = rgb(89dceb)
$sapphire  = rgb(74c7ec)
$blue      = rgb(89b4fa)
$lavender  = rgb(b4befe)

# 文字
$text     = rgb(cdd6f4)
$subtext1 = rgb(bac2de)
$subtext0 = rgb(a6adc8)

# 表面 / 背景（淺到深）
$overlay2 = rgb(9399b2)
$overlay1 = rgb(7f849c)
$overlay0 = rgb(6c7086)
$surface2 = rgb(585b70)
$surface1 = rgb(45475a)
$surface0 = rgb(313244)
$base     = rgb(1e1e2e)
$mantle   = rgb(181825)
$crust    = rgb(11111b)
