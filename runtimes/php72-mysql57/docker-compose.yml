# Prod-parity runtime：PHP 7.2 + MySQL 5.7 + nginx，對齊「接案常見的凍結舊環境」。
#
# 目的不是跑最新，是逐項對齊 client 的 prod：image tag 釘死 OS 世代、
# 擴充清單等於 prod、sql_mode/時區抄 prod。host 機是 Arch 還是 macOS 都無所謂——
# parity 的載體是這裡的 image tag 跟 config，不是你的主機。
services:
  php:
    build: ./php
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db

  web:
    image: nginx:1.18          # 釘到 client prod 的 nginx 版本，不用 latest（會隨 rebuild 漂）
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  db:
    image: mysql:5.7           # 5.7 跟 PHP 7.2 同期；不是 latest，凍結成 prod 版
    platform: linux/amd64      # mysql:5.7 無 arm64 原生 image；Apple Silicon 主機靠模擬跑 amd64，
                               # 剛好對齊 prod 的 amd64（dev 是模擬 amd64、prod 是原生 amd64）
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: app
      TZ: Asia/Taipei          # 對齊 prod 時區——跨時區的 DATE/NOW() 差異是常見隱形 bug
    volumes:
      - db-data:/var/lib/mysql
      - ./mysql/conf.d:/etc/mysql/conf.d:ro

volumes:
  db-data:
