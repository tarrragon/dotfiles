# Hyprland 最小配置 — 第一步：驗證在 virtio-gpu 上能否啟動 + render
# stow package: hyprland/ → 部署到 ~/.config/hypr/hyprland.conf
# 完整 wiki: https://wiki.hyprland.org/

# --- 螢幕 ---
# VM 只有一個虛擬輸出，用 preferred 解析度、auto 位置、縮放 1
monitor = , preferred, auto, 1

# --- VM / virtio-gpu 關鍵設定 ---
# 虛擬 GPU 的 hardware cursor 常失效（游標不可見）。
# 舊作法是 env WLR_NO_HARDWARE_CURSORS=1，但 Hyprland 改用 Aquamarine 後端後
# 該 env 多半被忽略，改成 cursor{} 區塊設定。這是要實測確認的 migration 點。
cursor {
    no_hardware_cursors = true
}

# --- 輸入 ---
input {
    kb_layout = us
}

# --- 配色（第二步 rice：source 集中配色，供本檔與 hyprlock 用）---
# themes/ stow package 把 colors.conf 放到 ~/.config/hypr/，這裡相對 source。
source = ~/.config/hypr/colors.conf

# --- 變數 ---
$mainMod = SUPER
$terminal = foot
$menu = wofi --show drun
$lock = hyprlock

# --- 啟動時自動拉起桌面 shell ---
# Hyprland 只啟動這裡列的程式；shell 不會「自動連動」，漏列 = 開機後桌面空的。
# Caelestia 是主 shell（自帶 bar / 通知 / 鎖屏 / launcher）。
# waybar / mako 與它互斥：通知的 D-Bus name 單一擁有者、bar 會疊兩條——
# 停用 Caelestia 時再把下面兩行放開當 fallback。
exec-once = foot
exec-once = caelestia shell -d
# exec-once = waybar
# exec-once = mako

# --- 鍵位 ---
bind = $mainMod, Q, exec, $terminal   # 開終端機
bind = $mainMod, C, killactive        # 關目前視窗
bind = $mainMod, M, exit              # 離開 Hyprland 回 TTY
bind = $mainMod, D, exec, $menu       # 應用啟動器（wofi）
bind = $mainMod, L, exec, $lock       # 鎖屏（hyprlock）

# 截圖（grim + slurp + wl-clipboard）→ 複製到剪貼簿
# 必須帶 --type image/png：沒裝 xdg-utils 時 wl-copy 推不出型別、會誤標 text/plain，
# 貼進影像應用程式就拿不到圖（實測，見 handson record 階段三第二步）。
# 全螢幕；SUPER 版 slurp 框選區域。
bind = , Print, exec, grim - | wl-copy --type image/png
bind = $mainMod, Print, exec, grim -g "$(slurp)" - | wl-copy --type image/png

# --- 外觀（最小、動畫關閉降低 VM 負擔與變數）---
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    # 邊框顏色用 colors.conf 的變數（rice 視覺層、跟 waybar/wofi 同一套配色）
    col.active_border = $blue
    col.inactive_border = $surface0
}

decoration {
    rounding = 4
}

animations {
    enabled = false
}
